<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SocialMood Analyzer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; }
        .navbar { background: linear-gradient(135deg, #667eea, #764ba2); }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); border: none; }
        .emoji-big { font-size: 80px; }
    </style>
</head>
<body>
<nav class="navbar navbar-dark px-4 py-3">
    <a class="navbar-brand fw-bold" href="/">SocialMood Analyzer</a>
    <div>
        <a href="/" class="btn btn-outline-light btn-sm me-2">Accueil</a>
        <a href="/historique/" class="btn btn-outline-light btn-sm me-2">Historique</a>
        <a href="/dashboard/" class="btn btn-outline-light btn-sm">Dashboard</a>
    </div>
</nav>
<div class="container mt-4">
    {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
